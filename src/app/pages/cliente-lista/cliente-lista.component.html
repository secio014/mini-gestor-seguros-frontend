<p-table [value]="clientes">
  
  <ng-template #header>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Ações</th>
    </tr>
  </ng-template>

  <ng-template #body let-cliente>
    <tr>
        <td> {{ cliente.id }} </td>
        <td> {{ cliente.nome }} </td>
        <td>
          <p-button icon="pi pi-trash" severity="danger" (click)="excluirCliente(cliente.id)"></p-button>
        </td>
    </tr>
  </ng-template>

</p-table>
<p-confirmDialog></p-confirmDialog>
